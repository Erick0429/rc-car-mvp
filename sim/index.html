<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RC Car MVP Simulator</title>
    <style>
      html, body, #app { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
      #hud {
        position: fixed; top: 12px; left: 12px; color: #fff;
        font-family: monospace; font-size: 13px;
        background: rgba(0,0,0,0.55); padding: 10px 14px;
        border-radius: 8px; line-height: 1.7; min-width: 210px;
      }
      .mode-manual    { color: #ffcc00; font-weight: bold; }
      .mode-autopilot { color: #44ff88; font-weight: bold; }
      .rec            { color: #ff4444; }
      #hint {
        position: fixed; bottom: 12px; left: 12px; color: #aaa;
        font-family: monospace; font-size: 11px;
        background: rgba(0,0,0,0.45); padding: 6px 10px;
        border-radius: 6px; line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="hud-mode">MODE: <span class="mode-manual">MANUAL</span></div>
      <div id="hud-speed">SPD: 0.00</div>
      <div id="hud-steering">STR: 0.00</div>
      <div id="hud-radius">RAD: 0.00 m</div>
      <div id="hud-frames">FRAMES: 0</div>
    </div>
    <div id="hint">
      [A] Toggle Autopilot &nbsp;|&nbsp; [R] Start/Stop Record &nbsp;|&nbsp; [E] Export JSON<br>
      [&#x2191;] Throttle &nbsp;|&nbsp; [&#x2190;][&#x2192;] Steer &nbsp;(manual mode only)
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
